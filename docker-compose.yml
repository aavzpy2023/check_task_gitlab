services:
  nginx:
    image: nginx:latest
    container_name: main_proxy
    ports:
      - "80:80"
    networks:
      - app-network
    depends_on:
      # backend:
      #   condition: service_healthy
      frontend-react:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf

  backend:
    # build: ./backend
    image: check_task_gitlab-backend:latest
    container_name: gitlab_dashboard_backend
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload
    env_file:
      - .env
    networks:
      - app-network
    volumes:
      - ./backend:/app
      - ./backend/data:/app/data
    depends_on:
      postgres_chatbot:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/sync/status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend-react:
    # build: ./frontend-react
    image: check_task_gitlab-frontend-react:latest
    container_name: gitlab_dashboard_frontend_react
    command: npm run dev
    networks:
      - app-network
    restart: unless-stopped
    environment:
      - CHOKIDAR_USEPOLLING=true
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/tareas/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - ./frontend-react:/app
      - /app/node_modules
    
  postgres_chatbot:
    image: postgres:16
    container_name: postgres_chatbot
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5439:5432"
    networks:
      - app-network
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data: